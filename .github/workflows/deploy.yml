name: Pipeline CI/CD TechAssist

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: techassist-helpdesk
  DOCKER_TAG: ${{ github.sha }}

jobs:

  # ============================================================
  # JOB 1 — VALIDATION DU CODE
  # ============================================================
  validate:
    name: Validation du code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Initialisation Terraform
        run: |
          cd terraform
          terraform init -backend=false

      - name: Validation syntaxe Terraform
        run: |
          cd terraform
          terraform validate
          echo "✅ Terraform valide"

      - name: Validation des manifests Kubernetes
        run: |
          for file in kubernetes/*.yaml; do
            echo "Vérification de $file..."
            python3 -c "import sys,yaml; yaml.safe_load(open('$file'))" \
            && echo "✅ $file valide" \
            || echo "❌ $file invalide"
          done

      - name: Vérification fichiers Docker
        run: |
          test -f docker/Dockerfile \
          && echo "✅ Dockerfile présent" \
          || (echo "❌ Dockerfile manquant" && exit 1)

          test -f docker/docker-compose.yml \
          && echo "✅ docker-compose.yml présent" \
          || (echo "❌ docker-compose.yml manquant" && exit 1)

  # ============================================================
  # JOB 2 — BUILD DE L'IMAGE DOCKER
  # ============================================================
  build:
    name: Construction image Docker
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construction et push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/techassist-helpdesk:latest
            ghcr.io/${{ github.repository_owner }}/techassist-helpdesk:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du build
        run: |
          echo "✅ Image construite : ghcr.io/${{ github.repository_owner }}/techassist-helpdesk:${{ github.sha }}"

  # ============================================================
  # JOB 3 — TESTS INFRASTRUCTURE
  # ============================================================
  test-infra:
    name: Tests infrastructure
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Test PostgreSQL standalone
        run: |
          docker run -d \
            --name test-db \
            -e POSTGRES_DB=zammad_production \
            -e POSTGRES_USER=zammad \
            -e POSTGRES_PASSWORD=TechAssist2026! \
            postgres:15-alpine

          sleep 15

          docker exec test-db pg_isready -U zammad \
          && echo "✅ PostgreSQL opérationnel" \
          || (echo "❌ PostgreSQL KO" && exit 1)

          docker rm -f test-db

      - name: Test Redis standalone
        run: |
          docker run -d --name test-redis redis:7-alpine
          sleep 5

          docker exec test-redis redis-cli ping \
          && echo "✅ Redis opérationnel" \
          || (echo "❌ Redis KO" && exit 1)

          docker rm -f test-redis

      - name: Résumé tests
        run: |
          echo "✅ PostgreSQL OK"
          echo "✅ Redis OK"
          echo "✅ Tous les tests infrastructure passés"

  # ============================================================
  # JOB 4 — DÉPLOIEMENT PRODUCTION
  # ============================================================
  deploy:
    name: Déploiement production AWS
    runs-on: ubuntu-latest
    needs: [build, test-infra]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Résumé déploiement
        run: |
          echo "🚀 Prêt pour le déploiement sur AWS"
          echo "Commit : ${{ github.sha }}"
          echo "Branche : ${{ github.ref_name }}"
          echo "Auteur : ${{ github.actor }}"
          echo "Note : déploiement AWS activé après terraform apply"
