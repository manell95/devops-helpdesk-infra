name: Pipeline CI/CD TechAssist

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Permission explicite pour écrire les packages
permissions:
  contents: read
  packages: write

env:
  DOCKER_IMAGE: techassist-helpdesk
  DOCKER_TAG: ${{ github.sha }}

jobs:

  validate:
    name: Validation du code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Initialisation Terraform
        run: |
          cd terraform
          terraform init -backend=false

      - name: Validation syntaxe Terraform
        run: |
          cd terraform
          terraform validate
          echo "✅ Terraform valide"

      - name: Validation des manifests Kubernetes
        run: |
          for file in kubernetes/*.yaml; do
            python3 -c "import sys,yaml; yaml.safe_load(open('$file'))" \
            && echo "✅ $file valide"
          done

      - name: Vérification fichiers Docker
        run: |
          test -f docker/Dockerfile && echo "✅ Dockerfile présent"
          test -f docker/docker-compose.yml && echo "✅ docker-compose.yml présent"

  build:
    name: Construction image Docker
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construction et push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.actor }}/techassist-helpdesk:latest
            ghcr.io/${{ github.actor }}/techassist-helpdesk:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du build
        run: echo "✅ Image construite avec succès"

  test-infra:
    name: Tests infrastructure
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Test PostgreSQL
        run: |
          docker run -d \
            --name test-db \
            -e POSTGRES_DB=zammad_production \
            -e POSTGRES_USER=zammad \
            -e POSTGRES_PASSWORD=TechAssist2026! \
            postgres:15-alpine
          sleep 15
          docker exec test-db pg_isready -U zammad \
          && echo "✅ PostgreSQL opérationnel"
          docker rm -f test-db

      - name: Test Redis
        run: |
          docker run -d --name test-redis redis:7-alpine
          sleep 5
          docker exec test-redis redis-cli ping \
          && echo "✅ Redis opérationnel"
          docker rm -f test-redis

  deploy:
    name: Déploiement production AWS
    runs-on: ubuntu-latest
    needs: [build, test-infra]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Résumé déploiement
        run: |
          echo "🚀 Déploiement prêt !"
          echo "Commit  : ${{ github.sha }}"
          echo "Auteur  : ${{ github.actor }}"
          echo "Branche : ${{ github.ref_name }}"
          echo "✅ Pipeline complet réussi"
